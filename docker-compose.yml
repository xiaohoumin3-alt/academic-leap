version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: academic_leap_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: academic_leap
      POSTGRES_PASSWORD: academic_leap_password
      POSTGRES_DB: academic_leap
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U academic_leap"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: academic_leap_app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://academic_leap:academic_leap_password@postgres:5432/academic_leap?schema=public
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-change-this-in-production}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      APP_URL: http://localhost:3000
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "npx prisma migrate deploy && node server.js"

volumes:
  postgres_data:
