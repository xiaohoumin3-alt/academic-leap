services:
  - type: web
    name: academic-leap
    env: node
    buildCommand: pnpm install && pnpm build
    startCommand: pnpm start
    envVars:
      - key: NODE_VERSION
        value: 18
      - key: DATABASE_URL
        fromDatabase:
          name: academic-leap-db
          property: connectionString
      - key: NEXTAUTH_URL
        value: https://academic-leap.onrender.com
      - key: NEXTAUTH_SECRET
        sync: false
      - key: GEMINI_API_KEY
        sync: false

databases:
  - name: academic-leap-db
    databaseName: academic_leap
    user: academic_leap_user
